<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    <div class="signup-container">
        <h1>Create Account</h1>
        <p>Sign up to start your Bigg Mini Cafe experience</p>

        <form class="signupForm" id="signupForm">
            <label for="signupName">Name</label>
            <input id="signupName" type="text" placeholder="Your full name" required>

            <label for="signupAddress">Address</label>
            <input id="signupAddress" type="text" placeholder="Your address" required>

            <label for="signupPhone">Phone Number</label>
            <input id="signupPhone" type="tel" placeholder="024 000 0000" required>

            <label for="signupEmail">Email</label>
            <input id="signupEmail" type="email" placeholder="you@example.com" required>

            <label for="signupPassword">Password</label>
            <input id="signupPassword" type="password" placeholder="Create password" required>

            <button type="submit">Sign Up</button>
        </form>

        <div class="back">
            <p>Already have an account? <a href="SignIn.html">Sign in</a></p>
        </div>
    </div>

  
</body>
</html>

  <script>
        document.addEventListener('DOMContentLoaded', function() {
            const signupForm = document.getElementById('signupForm');
            
            signupForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = document.getElementById('signupName').value.trim();
                const address = document.getElementById('signupAddress').value.trim();
                const phone = document.getElementById('signupPhone').value.trim();
                const email = document.getElementById('signupEmail').value.trim();
                const password = document.getElementById('signupPassword').value;
                
                // Validate inputs
                if (!name || !address || !phone || !email || !password) {
                    showError('Please fill in all fields');
                    return;
                }
                
                // Email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showError('Please enter a valid email address');
                    return;
                }
                
                // Password validation (at least 6 characters)
                if (password.length < 6) {
                    showError('Password must be at least 6 characters long');
                    return;
                }
                
                // Phone validation (at least 10 characters)
                if (phone.length < 10) {
                    showError('Please enter a valid phone number');
                    return;
                }
                
                // Create user object
                const newUser = {
                    name: name,
                    address: address,
                    phone: phone,
                    email: email,
                    password: password, // NOTE: In production, hash this before sending to database
                    createdAt: new Date().toISOString()
                };
                
                // For now, store in localStorage (you'll replace this with MySQL later)
                const existingUsers = JSON.parse(localStorage.getItem('users')) || [];
                
                // Check if email already exists
                if (existingUsers.some(user => user.email === email)) {
                    showError('This email is already registered');
                    return;
                }
                
                // Add new user
                existingUsers.push(newUser);
                localStorage.setItem('users', JSON.stringify(existingUsers));
                
                // Log in the new user
                const userData = {
                    email: email,
                    fullName: name,
                    loginTime: new Date().toISOString()
                };
                localStorage.setItem('currentUser', JSON.stringify(userData));
                localStorage.setItem('isLoggedIn', 'true');
                
                // Show success message
                showSuccess('Account created successfully! Redirecting...');
                
                // Redirect to homepage after 1.5 seconds
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1500);
            });
            
            function showError(message) {
                let errorDiv = document.querySelector('.error-message');
                if (!errorDiv) {
                    errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message';
                    signupForm.appendChild(errorDiv);
                }
                errorDiv.textContent = message;
            }
            
            function showSuccess(message) {
                let successDiv = document.querySelector('.success-message');
                if (!successDiv) {
                    successDiv = document.createElement('div');
                    successDiv.className = 'success-message';
                    signupForm.appendChild(successDiv);
                }
                successDiv.textContent = message;
            }
        });
    </script>


    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #efedeb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 1.2rem;
        }

        .signup-container {
            width: 100%;
            max-width: 430px;
            background: #f5f5f5;
            border: 1px solid #e2e2e2;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 18px 40px rgba(25, 25, 25, 0.08);
        }

        .signup-container h1 {
            margin: 0 0 0.35rem;
            color: #2d2d2d;
            font-size: 2rem;
        }

        .signup-container p {
            margin: 0;
            color: #666;
        }

        .signupForm {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        .signupForm label {
            color: #666;
            font-size: 0.9rem;
        }

        .signupForm input {
            width: 100%;
            border: 1px solid #d6d6d6;
            border-radius: 10px;
            background: #ececec;
            color: #333;
            padding: 0.8rem 0.9rem;
            font-size: 0.95rem;
            outline: none;
        }

        .signupForm input:focus {
            border-color: #c4c4c4;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
        }

        .signupForm button {
            margin-top: 0.45rem;
            border: 1px solid #d4d4d4;
            border-radius: 999px;
            padding: 0.72rem 1.2rem;
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            font-weight: 700;
            background: #f4f4f4;
            color: #202020;
            cursor: pointer;
            width: fit-content;
        }

        .signupForm button:hover {
            background: #e9e9e9;
        }

        .back {
            margin-top: 1rem;
            color: #2f2f2f;
            font-size: 1rem;
        }

        .back a {
            color: #2f2f2f;
            text-decoration: none;
        }

        .back a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .success-message {
            color: #388e3c;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
    </style>
