<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bigg Mini Cafe</title>
</head>
<body>
    <div class="signup-container">
        <h1>Create Account</h1>
        <p>Sign up to start your Bigg Mini Cafe experience</p>

        <form class="signupForm" id="signupForm" novalidate>
            <label for="signupName">Full Name</label>
            <input id="signupName" type="text" placeholder="Your full name" required>

            <label for="signupAddress">Address</label>
            <input id="signupAddress" type="text" placeholder="Your address" required>

            <label for="signupPhone">Phone Number</label>
            <input id="signupPhone" type="tel" placeholder="024 000 0000" required>

            <label for="signupEmail">Email</label>
            <input id="signupEmail" type="email" placeholder="you@example.com" required>

            <label for="signupPassword">Password</label>
            <input id="signupPassword" type="password" placeholder="Create password (min. 6 characters)" required>

            <label for="signupPasswordConfirm">Confirm Password</label>
            <input id="signupPasswordConfirm" type="password" placeholder="Confirm password" required>

            <button type="submit" id="signupBtn">Sign Up</button>
            
            <div class="message" id="messageBox"></div>
        </form>

        <div class="back">
            <p>Already have an account? <a href="SignIn.html">Sign in</a></p>
        </div>
    </div>

    <script type="module">
        import { signUpUser } from './auth.js';

        document.addEventListener('DOMContentLoaded', function() {
            const signupForm = document.getElementById('signupForm');
            const messageBox = document.getElementById('messageBox');
            const signupBtn = document.getElementById('signupBtn');
            
            signupForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const name = document.getElementById('signupName').value.trim();
                const address = document.getElementById('signupAddress').value.trim();
                const phone = document.getElementById('signupPhone').value.trim();
                const email = document.getElementById('signupEmail').value.trim();
                const password = document.getElementById('signupPassword').value.trim();
                const confirmPassword = document.getElementById('signupPasswordConfirm').value.trim();
                
                // Validate inputs
                if (!name || !address || !phone || !email || !password || !confirmPassword) {
                    showMessage('Please fill in all fields', 'error');
                    return;
                }
                
                // Email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showMessage('Please enter a valid email address', 'error');
                    return;
                }
                
                // Password validation (at least 6 characters)
                if (password.length < 6) {
                    showMessage('Password must be at least 6 characters long', 'error');
                    return;
                }

                // Confirm password match
                if (password !== confirmPassword) {
                    showMessage('Passwords do not match', 'error');
                    return;
                }
                
                // Phone validation (at least 10 characters)
                if (phone.length < 10) {
                    showMessage('Please enter a valid phone number', 'error');
                    return;
                }
                
                // Disable button and show loading state
                signupBtn.disabled = true;
                signupBtn.innerHTML = '<span class="loading"></span> Creating account...';
                
                // Sign up with Firebase
                const result = await signUpUser(email, password, {
                    name: name,
                    address: address,
                    phone: phone
                });
                
                if (result.success) {
                    showMessage('Account created successfully! Redirecting...', 'success');
                    // Redirect to homepage after 2 seconds
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showMessage('Error: ' + result.error, 'error');
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'Sign Up';
                }
            });
            
            function showMessage(message, type) {
                messageBox.textContent = message;
                messageBox.className = `message show ${type}-message`;
            }
        });
    </script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #efedeb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 1.2rem;
        }

        .signup-container {
            width: 100%;
            max-width: 430px;
            background: #f5f5f5;
            border: 1px solid #e2e2e2;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 18px 40px rgba(25, 25, 25, 0.08);
        }

        .signup-container h1 {
            margin: 0 0 0.35rem;
            color: #2d2d2d;
            font-size: 2rem;
        }

        .signup-container p {
            margin: 0;
            color: #666;
        }

        .signupForm {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        .signupForm label {
            color: #666;
            font-size: 0.9rem;
        }

        .signupForm input {
            width: 100%;
            border: 1px solid #d6d6d6;
            border-radius: 10px;
            background: #ececec;
            color: #333;
            padding: 0.8rem 0.9rem;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .signupForm input:focus {
            border-color: #c4c4c4;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
        }

        .signupForm button {
            margin-top: 0.45rem;
            border: 1px solid #d4d4d4;
            border-radius: 999px;
            padding: 0.72rem 1.2rem;
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            font-weight: 700;
            background: #f4f4f4;
            color: #202020;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .signupForm button:hover {
            background: #e9e9e9;
        }

        .signupForm button:disabled {
            background: #d4d4d4;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .back {
            margin-top: 1rem;
            color: #2f2f2f;
            font-size: 1rem;
        }

        .back a {
            color: #2f2f2f;
            text-decoration: none;
        }

        .back a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 0.75rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.show {
            display: block;
        }

        .error-message {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ef5350;
        }

        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #66bb6a;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #2f2f2f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
