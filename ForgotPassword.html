<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
</head>
<body>
    <div class="forgot-container">
        <h1>Reset Password</h1>
        <p>Enter your email address and we'll send you a link to reset your password</p>

        <form class="forgotForm" id="forgotForm">
            <label for="forgotEmail">Email Address</label>
            <input id="forgotEmail" type="email" placeholder="you@example.com" required>

            <button type="submit">Send Reset Link</button>
        </form>

        <div class="links">
            <p>Remember your password? <a href="SignIn.html">Sign in</a></p>
            <p>Don't have an account? <a href="SignUp.html">Sign up</a></p>
        </div>
    </div>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #efedeb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 1.2rem;
        }

        .forgot-container {
            width: 100%;
            max-width: 430px;
            background: #f5f5f5;
            border: 1px solid #e2e2e2;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 18px 40px rgba(25, 25, 25, 0.08);
        }

        .forgot-container h1 {
            margin: 0 0 0.35rem;
            color: #2d2d2d;
            font-size: 2rem;
        }

        .forgot-container p {
            margin: 0;
            color: #666;
        }

        .forgotForm {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        .forgotForm label {
            color: #666;
            font-size: 0.9rem;
        }

        .forgotForm input {
            width: 100%;
            border: 1px solid #d6d6d6;
            border-radius: 10px;
            background: #ececec;
            color: #333;
            padding: 0.8rem 0.9rem;
            font-size: 0.95rem;
            outline: none;
        }

        .forgotForm input:focus {
            border-color: #c4c4c4;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
        }

        .forgotForm button {
            margin-top: 0.45rem;
            border: 1px solid #d4d4d4;
            border-radius: 999px;
            padding: 0.72rem 1.2rem;
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            font-weight: 700;
            background: #f4f4f4;
            color: #202020;
            cursor: pointer;
            width: fit-content;
        }

        .forgotForm button:hover {
            background: #e9e9e9;
        }

        .links {
            margin-top: 1rem;
            color: #2f2f2f;
            font-size: 1rem;
        }

        .links p {
            margin: 0.5rem 0;
        }

        .links a {
            color: #2f2f2f;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .success-message {
            color: #388e3c;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .info-message {
            background: #e3f2fd;
            color: #1976d2;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const forgotForm = document.getElementById('forgotForm');
            
            forgotForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('forgotEmail').value.trim();
                
                // Validate email
                if (!email) {
                    showError('Please enter your email address');
                    return;
                }
                
                // Email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showError('Please enter a valid email address');
                    return;
                }
                
                // Check if email exists in users list
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const userExists = users.some(user => user.email === email);
                
                if (!userExists) {
                    // For security, show generic message even if email doesn't exist
                    showSuccess('If this email exists in our system, you will receive a password reset link shortly');
                    
                    // In a real app, you would:
                    // 1. Generate a reset token
                    // 2. Store it in the database with expiration time
                    // 3. Send email with reset link
                    // 4. User clicks link and enters new password
                    
                    // For now, create a temporary reset token
                    const resetToken = Math.random().toString(36).substring(2, 15);
                    const resetData = {
                        email: email,
                        token: resetToken,
                        expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString() // 24 hours
                    };
                    
                    // Store reset token in localStorage
                    let resetTokens = JSON.parse(localStorage.getItem('resetTokens')) || [];
                    resetTokens.push(resetData);
                    localStorage.setItem('resetTokens', JSON.stringify(resetTokens));
                    
                    // Show info message
                    createInfoMessage(`
                        For testing purposes: Reset token is "${resetToken}". 
                        In production, this would be sent via email.
                    `);
                    
                    // Clear form
                    forgotForm.reset();
                    return;
                }
                
                // User found - show success message
                showSuccess('Password reset link sent! Check your email');
                
                // Generate reset token
                const resetToken = Math.random().toString(36).substring(2, 15);
                const resetData = {
                    email: email,
                    token: resetToken,
                    expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString() // 24 hours
                };
                
                // Store reset token
                let resetTokens = JSON.parse(localStorage.getItem('resetTokens')) || [];
                resetTokens = resetTokens.filter(t => t.email !== email); // Remove old tokens
                resetTokens.push(resetData);
                localStorage.setItem('resetTokens', JSON.stringify(resetTokens));
                
                // Show info message
                createInfoMessage(`
                    For testing purposes: Reset token is "${resetToken}". 
                    Use this token to reset your password on the reset page.
                `);
                
                // Clear form
                forgotForm.reset();
            });
            
            function showError(message) {
                clearMessages();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = message;
                forgotForm.appendChild(errorDiv);
            }
            
            function showSuccess(message) {
                clearMessages();
                const successDiv = document.createElement('div');
                successDiv.className = 'success-message';
                successDiv.textContent = message;
                forgotForm.appendChild(successDiv);
            }
            
            function createInfoMessage(message) {
                const infoDiv = document.createElement('div');
                infoDiv.className = 'info-message';
                infoDiv.innerHTML = message;
                forgotForm.parentElement.appendChild(infoDiv);
            }
            
            function clearMessages() {
                document.querySelectorAll('.error-message, .success-message').forEach(el => el.remove());
            }
        });
    </script>
</body>
</html>
