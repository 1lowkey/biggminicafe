<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Bigg Mini Cafe</title>
</head>
<body>
    <div class="login-container">
        <h1>Welcome Back</h1>
        <p>Sign in to continue to Bigg Mini Cafe</p>

        <form class="loginForm" id="loginForm" novalidate>
            <label for="signinEmail">Email</label>
            <input id="signinEmail" type="email" placeholder="you@example.com" required>

            <label for="signinPassword">Password</label>
            <input id="signinPassword" type="password" placeholder="Enter password" required>

            <button type="submit" id="signinBtn">Sign In</button>
            
            <div class="message" id="messageBox"></div>
        </form>

        <div class="links">
            <p><a href="ForgotPassword.html" class="forgot-link">Forgot password?</a></p>
            <p>Don't have an account? <a href="SignUp.html">Sign up</a></p>
        </div>
    </div>

    <script type="module">
        import { signInUser } from './auth.js';

        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const messageBox = document.getElementById('messageBox');
            const signinBtn = document.getElementById('signinBtn');
            
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('signinEmail').value.trim();
                const password = document.getElementById('signinPassword').value.trim();
                
                // Validate inputs
                if (!email || !password) {
                    showMessage('Please enter both email and password', 'error');
                    return;
                }
                
                // Email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showMessage('Please enter a valid email address', 'error');
                    return;
                }
                
                // Disable button and show loading state
                signinBtn.disabled = true;
                signinBtn.innerHTML = '<span class="loading"></span> Signing in...';
                
                // Sign in with Firebase
                const result = await signInUser(email, password);
                
                if (result.success) {
                    showMessage('Signed in successfully! Redirecting...', 'success');
                    // Redirect to homepage after 1.5 seconds
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showMessage('Error: ' + result.error, 'error');
                    signinBtn.disabled = false;
                    signinBtn.textContent = 'Sign In';
                }
            });
            
            function showMessage(message, type) {
                messageBox.textContent = message;
                messageBox.className = `message show ${type}-message`;
            }
        });
    </script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #efedeb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 1.2rem;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: #f5f5f5;
            border: 1px solid #e2e2e2;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 18px 40px rgba(25, 25, 25, 0.08);
        }

        .login-container h1 {
            margin: 0 0 0.35rem;
            color: #2d2d2d;
            font-size: 2rem;
        }

        .login-container p {
            margin: 0;
            color: #666;
        }

        .loginForm {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        .loginForm label {
            color: #666;
            font-size: 0.9rem;
        }

        .loginForm input {
            width: 100%;
            border: 1px solid #d6d6d6;
            border-radius: 10px;
            background: #ececec;
            color: #333;
            padding: 0.8rem 0.9rem;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .loginForm input:focus {
            border-color: #c4c4c4;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
        }

        .loginForm button {
            margin-top: 0.45rem;
            border: 1px solid #d4d4d4;
            border-radius: 999px;
            padding: 0.72rem 1.2rem;
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            font-weight: 700;
            background: #f4f4f4;
            color: #202020;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .loginForm button:hover {
            background: #e9e9e9;
        }

        .loginForm button:disabled {
            background: #d4d4d4;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .links {
            margin-top: 1rem;
            color: #2f2f2f;
            font-size: 0.95rem;
        }

        .links p {
            margin: 0.5rem 0;
        }

        .links a {
            color: #2f2f2f;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 0.75rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.show {
            display: block;
        }

        .error-message {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ef5350;
        }

        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #66bb6a;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #2f2f2f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
