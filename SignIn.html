<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
</head>
<body>
    <div class="login-container">
        <h1>Welcome Back</h1>
        <p>Sign in to continue to Bigg Mini Cafe</p>

        <form class="loginForm" id="loginForm">
            <label for="signinEmail">Email</label>
            <input id="signinEmail" type="email" placeholder="you@example.com" required>

            <label for="signinPassword">Password</label>
            <input id="signinPassword" type="password" placeholder="Enter password" required>

            <button type="submit">Sign In</button>
        </form>

        <div class="links">
            <p><a href="ForgotPassword.html" class="forgot-link">Forgot password?</a></p>
            <p>Don't have an account? <a href="SignUp.html">Sign up</a></p>
        </div>
    </div>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #efedeb;
            font-family: Arial, Helvetica, sans-serif;
            padding: 1.2rem;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: #f5f5f5;
            border: 1px solid #e2e2e2;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 18px 40px rgba(25, 25, 25, 0.08);
        }

        .login-container h1 {
            margin: 0 0 0.35rem;
            color: #2d2d2d;
            font-size: 2rem;
        }

        .login-container p {
            margin: 0;
            color: #666;
        }

        .loginForm {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }

        .loginForm label {
            color: #666;
            font-size: 0.9rem;
        }

        .loginForm input {
            width: 100%;
            border: 1px solid #d6d6d6;
            border-radius: 10px;
            background: #ececec;
            color: #333;
            padding: 0.8rem 0.9rem;
            font-size: 0.95rem;
            outline: none;
        }

        .loginForm input:focus {
            border-color: #c4c4c4;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
        }

        .loginForm button {
            margin-top: 0.45rem;
            border: 1px solid #d4d4d4;
            border-radius: 999px;
            padding: 0.72rem 1.2rem;
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            font-weight: 700;
            background: #f4f4f4;
            color: #202020;
            cursor: pointer;
            width: fit-content;
        }

        .loginForm button:hover {
            background: #e9e9e9;
        }

        .links {
            margin-top: 1rem;
            color: #2f2f2f;
            font-size: 1rem;
        }

        .links p {
            margin: 0.5rem 0;
        }

        .links a {
            color: #2f2f2f;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .forgot-link {
            color: #666;
            font-size: 0.9rem;
        }

        .error-message {
            color: #d32f2f;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .success-message {
            color: #388e3c;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('signinEmail').value;
                const password = document.getElementById('signinPassword').value;
                
                // Validate inputs
                if (!email || !password) {
                    showError('Please fill in all fields');
                    return;
                }
                
                // Get user from registered users
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => u.email === email && u.password === password);
                
                if (!user) {
                    showError('Invalid email or password');
                    return;
                }
                
                // Store user info in localStorage (you'll replace this with MySQL auth later)
                const userData = {
                    email: email,
                    fullName: user.name || 'User',
                    loginTime: new Date().toISOString()
                };
                
                // Save to localStorage
                localStorage.setItem('currentUser', JSON.stringify(userData));
                localStorage.setItem('isLoggedIn', 'true');
                
                // Show success message
                showSuccess('Login successful! Redirecting...');
                
                // Redirect to homepage after 1.5 seconds
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1500);
            });
            
            function showError(message) {
                let errorDiv = document.querySelector('.error-message');
                if (!errorDiv) {
                    errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message';
                    loginForm.appendChild(errorDiv);
                }
                errorDiv.textContent = message;
            }
            
            function showSuccess(message) {
                let successDiv = document.querySelector('.success-message');
                if (!successDiv) {
                    successDiv = document.createElement('div');
                    successDiv.className = 'success-message';
                    loginForm.appendChild(successDiv);
                }
                successDiv.textContent = message;
            }
        });
    </script>
</body>
</html>
